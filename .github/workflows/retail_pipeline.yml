name: Retail Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        pip install pandas pytest
    - name: Run tests
      run: |
        cd pipeline
        python3 -m pytest test_pipeline.py
